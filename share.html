<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PI实验室管理调研</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f4; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .card { background: #fff; border-radius: 24px; padding: 48px 40px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .badge { display: inline-block; background: #fef3c7; color: #b45309; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-bottom: 20px; }
  h1 { font-size: 22px; color: #1c1917; margin-bottom: 8px; font-weight: 700; }
  .subtitle { color: #78716c; font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
  .qr-wrap { background: #fafaf9; border: 2px solid #f5f5f4; border-radius: 16px; padding: 20px; display: inline-block; margin-bottom: 20px; }
  .qr-wrap img { width: 200px; height: 200px; display: block; }
  .url { color: #a8a29e; font-size: 11px; margin-bottom: 24px; word-break: break-all; }
  .features { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
  .feat { background: #fafaf9; border-radius: 12px; padding: 12px 8px; flex: 1; }
  .feat .icon { font-size: 20px; margin-bottom: 4px; }
  .feat .text { font-size: 11px; color: #78716c; }
  .note { color: #a8a29e; font-size: 11px; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="badge">学术调研</div>
  <h1>医学实验室管理访谈</h1>
  <p class="subtitle">扫码参与15分钟AI访谈<br>帮助我们了解实验室管理的真实痛点</p>
  <div class="qr-wrap">
    <img src="qr-interview.png" alt="扫码开始访谈">
  </div>
  <p class="url">terryfyl.github.io/pi-interview</p>
  <div class="features">
    <div class="feat"><div class="icon">🤖</div><div class="text">AI访谈员</div></div>
    <div class="feat"><div class="icon">⏱️</div><div class="text">15-20分钟</div></div>
    <div class="feat"><div class="icon">🔒</div><div class="text">隐私保护</div></div>
  </div>
  <p class="note">您的每一句真实反馈都非常有价值<br>没有标准答案，也没有对错之分</p>
</div>
</body>
</html>
