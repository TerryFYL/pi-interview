name = "pi-interview-api"
main = "src/index.ts"
compatibility_date = "2025-02-20"

# Secrets (set via wrangler secret put):
#   DEEPSEEK_API_KEY  — recommended, cheaper ($0.07/$0.27 per M tokens)
#   ANTHROPIC_API_KEY — alternative, higher quality
#
# Auto-detection: if both keys exist, LLM_PROVIDER decides which to use.
# If only one key exists, that provider is used automatically.

[vars]
# LLM_PROVIDER = "deepseek"  # or "anthropic" — auto-detected if not set
# MODEL = "deepseek-chat"    # auto-set based on provider if not specified
ALLOWED_ORIGIN = "*"
