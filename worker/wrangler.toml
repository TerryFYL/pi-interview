name = "pi-interview-api"
main = "src/index.ts"
compatibility_date = "2025-02-20"
account_id = "9afcf81ef46dbca6c5417e7514cea8d9"

# Secrets (set via wrangler secret put):
#   OPENROUTER_API_KEY — recommended, access to 200+ models
#   DEEPSEEK_API_KEY   — direct DeepSeek access
#   ANTHROPIC_API_KEY  — direct Anthropic access
#
# Auto-detection priority: OPENROUTER > ANTHROPIC > DEEPSEEK
# Override with LLM_PROVIDER env var.

[vars]
# LLM_PROVIDER = "openrouter"  # or "anthropic" / "deepseek" — auto-detected if not set
# MODEL = "minimax/minimax-m2.5"  # auto-set based on provider if not specified
ALLOWED_ORIGIN = "*"

# KV namespace for storing interview transcripts
# Created via: wrangler kv:namespace create INTERVIEWS
[[kv_namespaces]]
binding = "INTERVIEWS"
id = "c744f98803ba40f083970a7d2313de0b"
